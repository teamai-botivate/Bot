services:
  - type: web
    name: botivate-ai
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o
      - key: FAST_LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_TEMPERATURE
        value: "0"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENABLE_SUPABASE
        value: "true"
